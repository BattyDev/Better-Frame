<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a4549"/>
      <stop offset="0.55" stop-color="#1f2528"/>
      <stop offset="1" stop-color="#0f1416"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff5d6"/>
      <stop offset="0.5" stop-color="#e8d28a"/>
      <stop offset="1" stop-color="#9c7a3c"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0.6" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- stone background -->
  <rect x="6" y="6" width="244" height="244" rx="42" fill="url(#stone)" stroke="#0a0d0f" stroke-width="3"/>

  <!-- subtle teal cracks -->
  <g stroke="#0aa39a" stroke-width="1.4" fill="none" opacity="0.55" stroke-linecap="round">
    <path d="M22 60 Q40 80 30 110 T55 170"/>
    <path d="M232 70 Q210 95 224 130 T200 200"/>
    <path d="M40 220 Q70 200 110 215"/>
    <path d="M150 30 Q175 50 200 38"/>
    <path d="M128 18 L128 34"/>
    <path d="M128 222 L128 238"/>
  </g>

  <!-- inner bevel ring -->
  <rect x="14" y="14" width="228" height="228" rx="36" fill="none" stroke="#0e1518" stroke-width="2"/>
  <rect x="18" y="18" width="220" height="220" rx="32" fill="none" stroke="#2a3438" stroke-width="1" opacity="0.7"/>

  <!-- TT mark -->
  <g filter="url(#glow)">
    <!-- left T -->
    <g transform="translate(38 62)">
      <path d="M0 0 L84 0 L76 24 L8 24 Z" fill="url(#gold)" stroke="#0aa39a" stroke-width="1.8"/>
      <path d="M30 24 L54 24 L56 116 Q56 126 64 130 L20 130 Q28 126 28 116 Z" fill="url(#gold)" stroke="#0aa39a" stroke-width="1.8"/>
      <path d="M10 130 L74 130 L80 146 L4 146 Z" fill="url(#gold)" stroke="#0aa39a" stroke-width="1.8"/>
    </g>
    <!-- right T -->
    <g transform="translate(134 62)">
      <path d="M0 0 L84 0 L76 24 L8 24 Z" fill="url(#gold)" stroke="#0aa39a" stroke-width="1.8"/>
      <path d="M30 24 L54 24 L56 116 Q56 126 64 130 L20 130 Q28 126 28 116 Z" fill="url(#gold)" stroke="#0aa39a" stroke-width="1.8"/>
      <path d="M10 130 L74 130 L80 146 L4 146 Z" fill="url(#gold)" stroke="#0aa39a" stroke-width="1.8"/>
    </g>
  </g>

  <!-- vignette overlay -->
  <rect x="6" y="6" width="244" height="244" rx="42" fill="url(#vignette)"/>
</svg>
